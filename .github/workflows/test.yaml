name: Test Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests — LLM providers
        run: npm run test --workspace=packages/llm

      - name: Run unit tests — Connectors
        run: npm run test --workspace=packages/connectors

      - name: Run unit tests — QA Agent
        run: npm run test --workspace=packages/agents/qa-agent

      - name: Run unit tests — API Server routes
        run: npm run test --workspace=packages/api-server

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/**/test-results/
          retention-days: 14
